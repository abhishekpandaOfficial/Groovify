<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groovify</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(99, 102, 241, 0.24), transparent 35%),
          linear-gradient(135deg, #0b1020, #111827 45%, #1f2937);
        color: #f8fafc;
        font-family: Inter, system-ui, sans-serif;
      }
      .card {
        width: min(92vw, 560px);
        padding: 32px 28px;
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.82);
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.1;
      }
      p {
        margin: 0 0 22px;
        color: #cbd5e1;
        line-height: 1.7;
      }
      a {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        color: white;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Groovify could not find that page</h1>
      <p>The link may be outdated or unavailable right now. Return to the app and keep the music going.</p>
      <a href="/">Back to Groovify</a>
    </main>
  </body>
</html>
